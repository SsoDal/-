name: 경제 비서 - 실시간 종목 리포트

on:
  # ─────────────────────────────────────────────────
  # 스케줄 설명 (KST = UTC+9)
  #
  # 장중(KST 09:00~15:30): 30분 간격
  #   UTC 00:00~06:30 → cron으로 표현:
  #   00분, 30분 at UTC 0,1,2,3,4,5,6시
  #   + UTC 06:00 (KST 15:00), UTC 06:30 (KST 15:30)
  #
  # 장 시작 전(KST 08:00, 08:30): 개장 준비
  # 장 마감 후(KST 16:00): 마감 요약
  #
  # ※ GitHub Actions cron은 UTC 기준
  # ※ 복잡한 */10 분 단위는 GitHub가 드랍하는 원인
  #   → 단순한 고정 시각으로만 지정
  # ─────────────────────────────────────────────────
  schedule:
    # KST 08:00 (장 시작 전 브리핑)
    - cron: '0 23 * * 0-4'   # 전날 UTC 23:00 = KST 당일 08:00
    # KST 08:30
    - cron: '30 23 * * 0-4'
    # KST 09:00 (장 시작)
    - cron: '0 0 * * 1-5'
    # KST 09:30
    - cron: '30 0 * * 1-5'
    # KST 10:00
    - cron: '0 1 * * 1-5'
    # KST 10:30
    - cron: '30 1 * * 1-5'
    # KST 11:00
    - cron: '0 2 * * 1-5'
    # KST 11:30
    - cron: '30 2 * * 1-5'
    # KST 12:00
    - cron: '0 3 * * 1-5'
    # KST 12:30
    - cron: '30 3 * * 1-5'
    # KST 13:00
    - cron: '0 4 * * 1-5'
    # KST 13:30
    - cron: '30 4 * * 1-5'
    # KST 14:00
    - cron: '0 5 * * 1-5'
    # KST 14:30
    - cron: '30 5 * * 1-5'
    # KST 15:00
    - cron: '0 6 * * 1-5'
    # KST 15:30 (장 마감)
    - cron: '30 6 * * 1-5'
    # KST 16:00 (마감 요약)
    - cron: '0 7 * * 1-5'

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'full'
        type: choice
        options:
          - full

jobs:
  stock-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # 최대 10분 — 멈춤 방지

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'         # pip 캐시로 빠른 설치

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install requests

      - name: 실행 시각 출력 (디버깅용)
        run: |
          echo "UTC: $(date -u)"
          echo "KST: $(TZ='Asia/Seoul' date)"

      - name: 경제 비서 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ inputs.mode || 'full' }}
        run: python main.py
