name: Daily Stock Report (경제 비서)

on:
  schedule:
    # KST 09:00 ~ 12:00 → 10분마다 (UTC 00:00 ~ 03:00)
    - cron: '*/10 0-2 * * *'     # UTC 00:00~02:59 → KST 09:00~11:59
    - cron: '0 3 * * *'          # UTC 03:00 → KST 12:00 (10분 주기 마무리)

    # 그 외 시간 → 30분마다
    - cron: '*/30 3-23 * * *'    # UTC 03:30~23:30 → KST 12:30~08:30 (다음날)

  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    
    # Node.js 24 강제 적용 (경고 제거)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
